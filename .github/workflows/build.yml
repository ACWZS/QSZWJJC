name: Unity WebGL Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码（含 LFS 文件）
      - uses: actions/checkout@v4
        with:
          lfs: true

      # 2. 缓存 Unity 库文件
      - uses: actions/cache@v4
        with:
          path: |
            Library
            Temp
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-

      # 3. （可选）检查中国版镜像是否存在
      - name: Check image availability
        run: docker pull unityci/editor:ubuntu-2022.3.62f3c1-webgl-1 || echo "镜像不存在，构建将失败"

      # 4. 构建 WebGL
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          customImage: unityci/editor:ubuntu-2022.3.62f3c1-webgl-1
          targetPlatform: WebGL

      # 5. 上传构建结果
      - uses: actions/upload-artifact@v4
        with:
          name: WebGLBuild
          path: build/WebGL

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # 6. 下载构建产物
      - uses: actions/download-artifact@v4
        with:
          name: WebGLBuild
          path: WebGLBuild

      # 7. 部署到 GitHub Pages
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: WebGLBuild
